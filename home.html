<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />

  <!-- Auth guard: if this visitor has no active session, route through
       the auth-check page to properly confirm it, then bounce to the
       main page instead of letting them see this protected content. -->
  <script>
    if (!localStorage.getItem("smartkiddo_logged_in_email")) {
      sessionStorage.setItem("smartkiddo_auth_action", "session-check");
      sessionStorage.setItem("smartkiddo_auth_success_redirect", "home.html");
      sessionStorage.setItem("smartkiddo_auth_fail_redirect", "index.html");
      window.location.href = "auth-check.html";
    }
  </script>

  <title>SmartKiddo Verse — Utama</title>
  <meta name="theme-color" content="#0a0714" />

  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg" />
  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="SmartKiddo Verse" />
  <link rel="apple-touch-icon" href="assets/icons/favicon.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/sidemenu.css" />
  <link rel="stylesheet" href="css/logout-notification.css" />
  <link rel="stylesheet" href="css/home.css" />
  <link rel="stylesheet" href="css/home-dashboard.css" />
</head>
<body>

  <div class="app">

    <!-- Top bar: hamburger + brand, overlaid on the video, same as the main page -->
    <div class="topbar">
      <button id="menuToggle" class="menu-toggle" aria-label="Buka menu" aria-expanded="false" aria-controls="sideMenu">
        <span class="menu-toggle__bar"></span>
        <span class="menu-toggle__bar"></span>
        <span class="menu-toggle__bar"></span>
      </button>
      <span class="brand">SmartKiddo <span class="brand__accent">Verse</span></span>
    </div>

    <!-- Side menu (slides in from left) — same component as the main page -->
    <div id="sideMenuBackdrop" class="side-menu-backdrop"></div>
    <nav id="sideMenu" class="side-menu" aria-hidden="true">
      <button id="menuClose" class="side-menu__close" aria-label="Tutup menu">&times;</button>

      <div class="side-menu__brand">SmartKiddo <span class="brand__accent">Verse</span></div>

      <!-- Shown when there is no active session (kept for structural
           consistency with the main page — in practice this page's own
           guard means only the logged-in state below is ever seen here) -->
      <div id="menuLoggedOut" class="menu-state">
        <form id="loginForm" class="login-form" autocomplete="off">
          <label class="login-form__label" for="loginEmail">Emel</label>
          <input class="login-form__input" type="email" id="loginEmail" name="loginEmail" placeholder="contoh@gmail.com" required />

          <label class="login-form__label" for="password">Kata Laluan</label>
          <input class="login-form__input" type="password" id="password" name="password" placeholder="Masukkan kata laluan" required />
          <p id="loginError" class="login-form__error" hidden></p>

          <button type="submit" class="login-form__submit">Log Masuk</button>
          <a href="#" class="login-form__forgot">Lupa kata laluan?</a>
        </form>

        <a href="signup.html" class="login-form__signup">Belum ada akaun? <strong>Daftar di sini</strong></a>

        <ul class="side-menu__links">
          <li><a href="#">Tentang Kami</a></li>
        </ul>
      </div>

      <!-- Shown when the visitor already has an active session -->
      <div id="menuLoggedIn" class="menu-state" hidden>
        <ul class="side-menu__links">
          <li><a href="home.html">Rumah</a></li>
          <li><a href="#">Permainan</a></li>
          <li><a href="#">Pencapaian Saya</a></li>
          <li><a href="#">Tentang Kami</a></li>
        </ul>
        <button id="sideMenuLogoutBtn" class="side-menu__logout">Log Keluar 👋</button>
      </div>
    </nav>

    <!-- Fullscreen welcome video, with the loading text layered directly
         on top of it (not a separate phase before it) — same fullscreen +
         rotation-safe treatment as the main page's video. -->
    <div id="homeVideoStage" class="home-video-stage">
      <video
        id="homeWelcomeVideo"
        class="home-video-stage__video"
        src="assets/videos/welcome-home.mp4"
        playsinline
        preload="auto"
      ></video>
      <div id="homeVideoText" class="home-video-stage__text">
        <h2 class="home-video-stage__title">SMART KIDDO</h2>
        <h3 class="home-video-stage__subtitle">VERSE</h3>
        <p class="home-video-stage__note">Page Loading. Please Wait...</p>
      </div>
    </div>

    <!-- Actual home content — hidden behind the video, fades in once it ends.
         Populated entirely by home-dashboard.js via SmartKiddoDashboard.init() -->
    <main id="homeMain" class="home-main"></main>

    <!-- "Lihat Semua / See All" popup -->
    <div id="rowPopup" class="row-popup" hidden>
      <button id="rowPopupClose" class="row-popup__close" aria-label="Tutup">&times;</button>
      <h2 id="rowPopupTitle" class="row-popup__title"></h2>
      <div id="rowPopupGrid" class="row-popup__grid"></div>
    </div>

    <!-- Bottom music player bar -->
    <div id="musicPlayerBar" class="music-player" hidden>
      <button id="musicPlayPause" class="music-player__btn" aria-label="Main/Jeda">▶</button>
      <div class="music-player__info">
        <span id="musicTrackName" class="music-player__track">—</span>
      </div>
      <button id="musicStop" class="music-player__btn" aria-label="Henti">⏹</button>
      <button id="musicToggle" class="music-player__toggle" aria-label="Sembunyi/Tunjuk">⌄</button>
    </div>

    <!-- Floating reveal button — shown only when the music bar is manually hidden -->
    <button id="musicRevealBtn" class="music-reveal-btn" hidden aria-label="Tunjuk pemain muzik">
      <span class="music-reveal-btn__ring" aria-hidden="true"></span>
      <span class="music-reveal-btn__core">AI</span>
    </button>
  </div>

  <!-- Logout success notification with animated green checkmark -->
  <div id="logoutNotification" class="logout-notification" hidden>
    <div class="logout-notification__card">
      <svg class="logout-notification__check" viewBox="0 0 52 52">
        <circle class="logout-notification__check-circle" cx="26" cy="26" r="23" fill="none" />
        <path class="logout-notification__check-mark" fill="none" d="M14 27l7 7 16-16" />
      </svg>
      <p class="logout-notification__text">Log keluar berjaya!</p>
    </div>
  </div>

  <script src="js/sound.js"></script>
  <script src="js/logout.js"></script>
  <script src="js/sidemenu.js"></script>
  <script src="js/home-video.js"></script>
  <script src="js/home-dashboard-data.js"></script>
  <script src="js/home-dashboard.js"></script>
  <script src="js/music-player.js"></script>
  <script src="js/home.js"></script>
  <script>
    SmartKiddoDashboard.init("homeMain");
    SmartKiddoMusicPlayer.init();
  </script>
</body>
</html>

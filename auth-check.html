<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <title>Menyemak Pengesahan — SmartKiddo Verse</title>
  <meta name="theme-color" content="#0a0714" />

  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg" />
  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="SmartKiddo Verse" />
  <link rel="apple-touch-icon" href="assets/icons/favicon.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/auth-check.css" />
</head>
<body>

  <div class="auth-check-stage">
    <video
      id="authVideo"
      class="auth-check-video"
      src="assets/videos/auth-video.mp4"
      playsinline
      preload="auto"
    ></video>
    <p id="authCheckText" class="auth-check-text"></p>
  </div>

  <script src="js/sound.js"></script>

  <!-- Firebase (compat SDK) — needed to verify login / session state -->
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/firebase-init.js"></script>

  <script src="js/auth-check-text.js"></script>
  <script src="js/auth-check.js"></script>
</body>
</html>
